<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doctor Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0d6efd 0%, #4bb4ff 100%);
            min-height: 100vh;
            display: emg_raw;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 15px;
            padding: 30px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            animation: fadeIn 0.7s ease;
        }

        .login-title {
            font-weight: 700;
            color: #0d6efd;
        }

        .form-label {
            font-weight: 600;
        }

        .btn-primary {
            background-color: #0d6efd;
            border-radius: 8px;
            font-weight: 600;
            padding: 10px;
            font-size: 16px;
        }

        .btn-primary:hover {
            background-color: #0b5ed7;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
    <div class="login-card shadow-lg">
        <h3 class="text-center mb-4 login-title">Doctor Login</h3>

        {% if error %}
        <div class="alert alert-danger text-center">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input name="username" type="text" class="form-control p-3" placeholder="Enter username" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input name="password" type="password" class="form-control p-3" placeholder="Enter password" required>
            </div>

            <button class="btn btn-primary w-100 mt-2" type="submit">Login</button>
        </form>

        <p class="text-center mt-3 text-muted" style="font-size: 14px;">
            © 2025 Medisight | Secure Access
        </p>
    </div>
</body>
</html>
