<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doctor Sign Up - NeuroSense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            color: #334155;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            animation: fadeIn 0.6s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .brand-logo {
            width: 60px;
            height: 60px;
            background: #0ea5e9;
            color: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            margin: 0 auto 20px;
            box-shadow: 0 4px 10px rgba(14, 165, 233, 0.3);
        }

        .page-title {
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 5px;
            font-size: 1.5rem;
        }

        .page-subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .form-label {
            font-weight: 600;
            color: #475569;
            font-size: 14px;
        }

        .form-control {
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            padding: 12px 15px;
            font-size: 15px;
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
        }

        .btn-primary {
            background-color: #0ea5e9;
            border-color: #0ea5e9;
            border-radius: 8px;
            font-weight: 600;
            padding: 12px;
            font-size: 16px;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background-color: #0284c7;
            border-color: #0284c7;
            transform: translateY(-1px);
        }

        .auth-links {
            margin-top: 20px;
            font-size: 14px;
            color: #64748b;
            text-align: center;
        }

        .auth-links a {
            color: #0ea5e9;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.15s;
        }

        .auth-links a:hover {
            color: #0284c7;
            text-decoration: underline;
        }

        .password-hint {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 4px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="brand-logo">N</div>
        <div class="text-center">
            <h3 class="page-title">Create Account</h3>
            <p class="page-subtitle">Register as a NeuroSense clinician</p>
        </div>

        {% if error %}
        <div class="alert alert-danger text-center" style="border-radius: 8px; font-size: 14px;">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input name="username" id="username" type="text" class="form-control"
                       placeholder="Choose a username" required autofocus>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input name="password" id="password" type="password" class="form-control"
                       placeholder="Create a strong password" required>
                <div class="password-hint">Minimum 8 characters recommended</div>
            </div>

            <div class="mb-4">
                <label class="form-label">Confirm Password</label>
                <input name="password_confirm" id="password_confirm" type="password" class="form-control"
                       placeholder="Repeat your password" required>
            </div>

            <button class="btn btn-primary w-100" type="submit" id="signupBtn">Create Account</button>
        </form>

        <div class="auth-links">
            <p>Already have an account? <a href="{% url 'login' %}">Sign in here</a></p>
        </div>

        <p class="text-center mt-3 text-muted" style="font-size: 12px; margin-bottom: 0;">
            © 2026 NeuroSense | Secure Clinical Access
        </p>
    </div>

    <script>
        // Client-side password match check
        document.querySelector('form').addEventListener('submit', function(e) {
            const p1 = document.getElementById('password').value;
            const p2 = document.getElementById('password_confirm').value;
            if (p1 !== p2) {
                e.preventDefault();
                alert('Passwords do not match. Please try again.');
                document.getElementById('password_confirm').focus();
            }
        });
    </script>
</body>
</html>
